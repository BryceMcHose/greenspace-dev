<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GreenSpace - Settings Dashboard</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>
<body>

  <div class="settings-container">
    
    <!-- Column 1: Sidebar Navigation Menu -->
    <aside class="settings-sidebar">
      <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 24px; padding: 0 12px;">
        <span class="material-symbols-rounded" style="color: var(--color-primary); font-size: 28px;">settings</span>
        <h2 style="font-size: 1.25rem; font-weight: 800; color: black; margin: 0;">Settings</h2>
      </div>
      
      <!-- Group selector dropdown -->
      <div class="form-group" style="padding: 0 12px; margin-bottom: 20px;">
        <label style="font-size: 0.72rem; font-weight: 700; text-transform: uppercase; color: var(--color-text-secondary); margin-bottom: 6px; display: block;">Active Park Group</label>
        <select id="active-park-group-selector" class="form-control" style="font-size: 0.85rem; height: 38px;">
          <!-- Dynamically populated -->
        </select>
      </div>

      <div id="settings-nav-items-container" style="display:flex; flex-direction:column; gap:4px;">
        <!-- Dynamically rendered navigation list -->
      </div>
      
      <div style="margin-top: auto; padding: 12px;">
        <button onclick="window.close()" class="btn btn-secondary" style="width:100%; border-radius:var(--radius-md);">
          <span class="material-symbols-rounded" style="font-size: 16px;">arrow_back</span>
          <span>Back to Dashboard</span>
        </button>
      </div>
    </aside>

    <!-- Column 2: Selection List -->
    <div class="settings-list-column">
      <div class="settings-list-header">
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <h3 id="list-title" style="font-size: 1.1rem; font-weight: 700; color: black; margin: 0;">Park Groups</h3>
          <button id="btn-add-item" class="btn btn-primary" style="padding: 6px 12px; font-size: 0.8rem; border-radius: var(--radius-md);">
            <span class="material-symbols-rounded" style="font-size: 14px;">add</span> Add
          </button>
        </div>
        <div class="search-input-wrapper" style="position: relative;">
          <span class="material-symbols-rounded" style="position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 18px; color: var(--color-text-muted);">search</span>
          <input type="text" id="settings-search" class="form-control" placeholder="Search..." style="padding-left: 36px; height: 36px; font-size: 0.85rem;">
        </div>
      </div>
      <div class="settings-list-items" id="settings-list-container">
        <!-- Dynamic list of items loaded here -->
      </div>
    </div>

    <!-- Column 3: Detail Form/Editor Area -->
    <main class="settings-detail-column" id="settings-editor-container">
      <!-- Dynamic editor form loaded here -->
    </main>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/settings.js"></script>
</body>
</html>
