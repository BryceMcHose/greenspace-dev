<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GreenSpace - Sign In</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <!-- Firebase JS Client compat SDKs via CDN -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <!-- Supabase JS Client via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <!-- Just Once Verification Constraint Banners -->
  <div id="temp-user-banner" class="verification-banner" style="display: none;">
    <span>Warning: You are logged in with a temporary account. Complete your profile setup to avoid losing access.</span>
  </div>
  <div id="unconfirmed-email-banner" class="verification-banner" style="display: none; background-color: #f8d7da; color: #721c24; border-color: #f5c6cb;">
    <span>Verify Email: Please confirm your email address. Some features are restricted. <button id="resend-verification-btn" class="auth-toggle-btn" style="color:#721c24;">Resend Verification Link</button></span>
  </div>

  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-logo-container">
          <img src="https://1bf580bb3eb00c4aca016f0ebaf1c320.cdn.bubble.io/cdn-cgi/image/w=256,h=256,f=auto,dpr=1,fit=contain/f1740544848178x886745907111146100/Park%20Patrol%20Logos%20-%2010.png" alt="GreenSpace Logo">
        </div>
        <h2 id="auth-title">Welcome Back</h2>
        <p id="auth-subtitle">Sign in to access your dashboard</p>
      </div>

      <div id="auth-message-banner" class="auth-message"></div>

      <form id="auth-form">
        <!-- SignUp fields (hidden by default) -->
        <div id="name-field-group" class="form-group" style="display: none;">
          <label for="fullName">Full Name</label>
          <input type="text" id="fullName" class="form-control" placeholder="John Doe">
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" class="form-control" placeholder="name@example.com" required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="form-control" placeholder="••••••••" required>
        </div>

        <button type="submit" id="submit-btn" class="btn btn-primary" style="width: 100%; margin-top: 8px;">
          Sign In
        </button>
        <div style="margin: 16px 0; text-align: center; color: var(--color-text-secondary); position: relative;">
          <span style="background: var(--bg-surface); padding: 0 12px; position: relative; z-index: 1;">or</span>
          <hr style="position: absolute; top: 50%; left: 0; right: 0; border: none; border-top: 1px solid var(--neutral-gray-border); margin: 0; z-index: 0;">
        </div>
        <button type="button" id="google-signin-btn" class="btn btn-secondary" style="width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; font-weight: 600;">
          <svg viewBox="0 0 24 24" width="18" height="18" style="display: block;"><path fill="#EA4335" d="M5.266 9.765A7.077 7.077 0 0 1 12 4.909c1.69 0 3.218.6 4.418 1.582l3.51-3.51C17.764 1.055 15.027 0 12 0 7.336 0 3.327 2.673 1.345 6.582l3.92 3.183z"/><path fill="#4285F4" d="M23.455 12.273c0-.818-.073-1.609-.209-2.373H12v4.582h6.427a5.53 5.53 0 0 1-2.4 3.627l3.745 2.909c2.19-2.027 3.682-5.009 3.682-8.745z"/><path fill="#FBBC05" d="M5.266 14.235A7.09 7.09 0 0 1 4.909 12c0-.79.136-1.545.357-2.265L1.345 6.554A11.954 11.954 0 0 0 0 12c0 1.927.455 3.745 1.255 5.373l4.01-3.138z"/><path fill="#34A853" d="M12 24c3.245 0 5.973-1.082 7.964-2.918l-3.745-2.909c-1.036.69-2.364 1.109-4.218 1.109-3.245 0-6-2.19-6.982-5.136L1.09 17.282A11.956 11.956 0 0 0 12 24z"/></svg>
          Sign in with Google
        </button>
      </form>

      <div style="text-align: center; margin-top: 12px;">
        <button id="forgot-password-link" class="auth-toggle-btn" style="font-size: 0.85rem; color: var(--color-text-muted);">Forgot your password?</button>
      </div>

      <div class="auth-toggle">
        <span id="toggle-text">Don't have an account?</span>
        <button id="toggle-btn" class="auth-toggle-btn">Sign Up</button>
      </div>
    </div>
  </div>

  <!-- Forgot Password Modal Overlay -->
  <div id="reset-password-modal" class="modal-overlay">
    <div class="modal-content">
      <button class="modal-close" id="close-reset-modal-btn">
        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>
      <h3 style="font-size: 1.5rem; font-weight: 800; margin-bottom: 24px;">Reset Password</h3>
      
      <form id="reset-password-form">
        <div class="form-group">
          <label for="reset-email">Email Address</label>
          <input type="email" id="reset-email" class="form-control" placeholder="name@example.com" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px;">
          Email me a password reset link
        </button>
      </form>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
